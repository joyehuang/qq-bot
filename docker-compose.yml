services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    ports:
      - "6099:6099"   # HTTP API
      - "6100:6100"   # WebSocket
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/data:/app/napcat/data
    environment:
      - NAPCAT_GID=0
      - NAPCAT_UID=0
    mac_address: "02:42:ac:11:00:02"
    stdin_open: true
    tty: true

  # Bot 主程序已迁移至宿主机 PM2 部署，便于直接调用 Hermes Agent CLI。
  # 见 ecosystem.config.js 与 CICD.md。

  admin-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-joyehuang}/qq-bot-admin-server:latest
    container_name: qq-bot-admin-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./prisma:/app/prisma
    environment:
      - NODE_ENV=production
      # schema 在 /app/prisma/schema.prisma；DATABASE_URL 是 schema-relative
      # → file:./dev.db 解析为 /app/prisma/dev.db（与宿主机 prisma/dev.db 一致）
      - DATABASE_URL=file:./dev.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001

  admin-web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-joyehuang}/qq-bot-admin-web:latest
    container_name: qq-bot-admin-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - admin-api
