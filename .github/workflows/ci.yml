name: CI/CD - 智能检查与部署

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # 检测哪些模块发生了变更
  detect-changes:
    name: 检测变更
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      admin-server: ${{ steps.filter.outputs.admin-server }}
      admin-web: ${{ steps.filter.outputs.admin-web }}
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🔍 检测文件变更
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bot:
              - 'src/**'
              - 'prisma/**'
              - 'package*.json'
              - 'tsconfig.json'
              - 'ecosystem.config.js'
            admin-server:
              - 'admin/server/**'
              - 'prisma/**'
            admin-web:
              - 'admin/web/**'

  # Bot 主程序类型检查
  check-bot:
    name: 类型检查 - Bot
    needs: detect-changes
    if: needs.detect-changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 安装依赖
        run: npm ci

      - name: 🔧 生成 Prisma Client
        run: npx prisma@6.19.0 generate

      - name: 🔍 TypeScript 编译检查
        run: npx tsc --noEmit

  # Admin Server 类型检查
  check-admin-server:
    name: 类型检查 - Admin Server
    needs: detect-changes
    if: needs.detect-changes.outputs.admin-server == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 安装 Bot 依赖（生成 Prisma Client）
        run: npm ci

      - name: 🔧 生成 Prisma Client
        run: npx prisma@6.19.0 generate

      - name: 📥 安装 Admin Server 依赖
        working-directory: admin/server
        run: npm ci

      - name: 🔍 TypeScript 编译检查
        working-directory: admin/server
        run: npx tsc --noEmit

  # Admin Web 类型检查
  check-admin-web:
    name: 类型检查 - Admin Web
    needs: detect-changes
    if: needs.detect-changes.outputs.admin-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 安装 Admin Web 依赖
        working-directory: admin/web
        run: npm ci

      - name: 🔍 TypeScript 编译检查
        working-directory: admin/web
        run: npx vue-tsc --noEmit

  # ========================================================================
  # Bot 主程序不再构建 Docker 镜像。Bot 直接在宿主机以 ts-node + PM2 运行，
  # 部署阶段通过 git pull + pm2 reload 完成更新。
  # ========================================================================

  # 构建并推送 Admin Server 镜像
  build-admin-server:
    name: 构建镜像 - Admin Server
    needs: [detect-changes, check-admin-server]
    if: |
      always() &&
      needs.detect-changes.outputs.admin-server == 'true' &&
      (needs.check-admin-server.result == 'success' || needs.check-admin-server.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🔐 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/qq-bot-admin-server
          tags: |
            type=sha,prefix={{branch}}-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=sha,prefix=sha-,enable=${{ !startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./admin/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 构建并推送 Admin Web 镜像
  build-admin-web:
    name: 构建镜像 - Admin Web
    needs: [detect-changes, check-admin-web]
    if: |
      always() &&
      needs.detect-changes.outputs.admin-web == 'true' &&
      (needs.check-admin-web.result == 'success' || needs.check-admin-web.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🔐 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/qq-bot-admin-web
          tags: |
            type=sha,prefix={{branch}}-,enable=${{ startsWith(github.ref, 'refs/heads/') }}
            type=sha,prefix=sha-,enable=${{ !startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔨 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ./admin/web
          file: ./admin/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # 部署到服务器（与 Hermes Agent 同机部署）
  deploy:
    name: 部署到服务器
    needs: [detect-changes, check-bot, build-admin-server, build-admin-web]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      (
        needs.detect-changes.outputs.bot == 'true' ||
        needs.detect-changes.outputs.admin-server == 'true' ||
        needs.detect-changes.outputs.admin-web == 'true'
      ) &&
      (needs.check-bot.result == 'success' || needs.check-bot.result == 'skipped') &&
      (needs.build-admin-server.result == 'success' || needs.build-admin-server.result == 'skipped') &&
      (needs.build-admin-web.result == 'success' || needs.build-admin-web.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: 📋 显示提交信息
        run: |
          echo "部署提交: ${{ github.sha }}"
          echo "提交者: ${{ github.actor }}"
          echo "更新的服务:"
          echo "  - Bot: ${{ needs.detect-changes.outputs.bot }}"
          echo "  - Admin Server: ${{ needs.detect-changes.outputs.admin-server }}"
          echo "  - Admin Web: ${{ needs.detect-changes.outputs.admin-web }}"

      - name: 🚀 SSH 到服务器执行部署
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: UPDATE_BOT,UPDATE_ADMIN_SERVER,UPDATE_ADMIN_WEB,GITHUB_REPOSITORY_OWNER
          script: |
            export UPDATE_BOT="${{ needs.detect-changes.outputs.bot }}"
            export UPDATE_ADMIN_SERVER="${{ needs.detect-changes.outputs.admin-server }}"
            export UPDATE_ADMIN_WEB="${{ needs.detect-changes.outputs.admin-web }}"
            export GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}"
            cd /mnt/hermes-data/community/projects/qq-bot
            bash scripts/deploy.sh

      - name: ✅ 部署完成
        run: echo "🎉 部署完成"
